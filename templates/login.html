{% extends "base.html" %}
{% block title %}Login — MediRecom{% endblock %}

{% block content %}
<div class="container" style="max-width:460px;">
  <div class="glass fade-in" style="padding:40px; margin-top:40px;">

    <!-- HEADER -->
    <div style="text-align:center; margin-bottom:32px;">
      <div style="display:inline-flex; align-items:center; justify-content:center;
                  width:56px; height:56px; background:rgba(59,109,17,0.15);
                  border-radius:50%; margin-bottom:16px;">
        <i class="fa-solid fa-right-to-bracket" style="font-size:24px; color:#3B6D11;"></i>
      </div>
      <h1 style="font-size:22px; font-weight:600; color:#27500A;">Welcome Back</h1>
      <p style="font-size:14px; color:#3B6D11; margin-top:6px;">Login to your MediRecom account</p>
    </div>

    <!-- FORM -->
    <form method="POST" action="/login">
      <div class="form-group">
        <label><i class="fa-solid fa-envelope" style="margin-right:6px;"></i>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-lock" style="margin-right:6px;"></i>Password</label>
        <input type="password" name="password" placeholder="Enter your password" required />
      </div>

      <button type="submit" class="btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
        <i class="fa-solid fa-right-to-bracket"></i> Login
      </button>
    </form>

    <!-- DIVIDER -->
    <div style="text-align:center; margin-top:24px; font-size:14px; color:#3B6D11;">
      Don't have an account?
      <a href="/register" style="color:#27500A; font-weight:600; text-decoration:none;">
        Sign up free
      </a>
    </div>

  </div>
</div>
{% endblock %}
