{% extends "base.html" %}
{% block title %}Register — MediRecom{% endblock %}

{% block content %}
<div class="container" style="max-width:500px;">
  <div class="glass fade-in" style="padding:40px; margin-top:40px;">

    <!-- HEADER -->
    <div style="text-align:center; margin-bottom:32px;">
      <div style="display:inline-flex; align-items:center; justify-content:center;
                  width:56px; height:56px; background:rgba(59,109,17,0.15);
                  border-radius:50%; margin-bottom:16px;">
        <i class="fa-solid fa-user-plus" style="font-size:24px; color:#3B6D11;"></i>
      </div>
      <h1 style="font-size:22px; font-weight:600; color:#27500A;">Create Account</h1>
      <p style="font-size:14px; color:#3B6D11; margin-top:6px;">Join MediRecom for free</p>
    </div>

    <!-- FORM -->
    <form method="POST" action="/register">

      <div class="form-group">
        <label><i class="fa-solid fa-user" style="margin-right:6px;"></i>Full Name</label>
        <input type="text" name="username" placeholder="Your name" required />
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-envelope" style="margin-right:6px;"></i>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required />
      </div>

      <div class="form-group">
        <label><i class="fa-solid fa-lock" style="margin-right:6px;"></i>Password</label>
        <input type="password" name="password" placeholder="Create a strong password" required />
      </div>

      <div class="form-group">
        <label>
          <i class="fa-solid fa-triangle-exclamation" style="margin-right:6px;"></i>
          Known Drug Allergies
          <span style="font-weight:400; color:#639922;">(optional)</span>
        </label>
        <input type="text" name="allergies"
               placeholder="e.g. penicillin, aspirin, ibuprofen" />
        <p style="font-size:12px; color:#639922; margin-top:6px;">
          <i class="fa-solid fa-circle-info"></i>
          Separate multiple allergies with commas. You can update this later.
        </p>
      </div>

      <button type="submit" class="btn-primary" style="width:100%; justify-content:center; margin-top:8px;">
        <i class="fa-solid fa-user-plus"></i> Create Account
      </button>
    </form>

    <!-- DIVIDER -->
    <div style="text-align:center; margin-top:24px; font-size:14px; color:#3B6D11;">
      Already have an account?
      <a href="/login" style="color:#27500A; font-weight:600; text-decoration:none;">
        Login here
      </a>
    </div>

  </div>
</div>
{% endblock %}
